name: Bug report
description: Report a reproducible, privacy-safe de-starter defect
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Use a synthetic reproduction. Do not attach purchased source, private diffs, credentials, tokens, or machine-specific paths.
  - type: dropdown
    id: stage
    attributes:
      label: Stage
      options:
        - discover
        - audit
        - preview
        - apply
        - verify
        - documentation or installation
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, filesystem type, and Agent client
      placeholder: macOS 15, Python 3.11, APFS, Codex
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: Minimal steps and synthetic fixture only
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected fail-closed behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed purchased code, private project identity, absolute machine paths, credentials, private diffs, backup mappings, and approval tokens.
          required: true
