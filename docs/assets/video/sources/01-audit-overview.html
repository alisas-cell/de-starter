<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>只读审计总览</title>
  <style>
    :root {
      --ink: #17203b;
      --muted: #66708a;
      --paper: #f6f8ff;
      --panel: #ffffff;
      --line: #dce2f2;
      --indigo: #5848d7;
      --indigo-soft: #eceaff;
      --cyan: #0f91a5;
      --cyan-soft: #e2f7f8;
      --amber: #c66a1b;
      --amber-soft: #fff1df;
      --rose: #b94863;
      --rose-soft: #ffe9ee;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 1600px;
      height: 900px;
      margin: 0;
      overflow: hidden;
      background: var(--paper);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background-image:
        linear-gradient(rgba(88, 72, 215, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(88, 72, 215, 0.045) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    main {
      width: 100%;
      height: 100%;
      padding: 54px 60px;
      display: grid;
      grid-template-columns: 0.92fr 1.08fr;
      gap: 32px;
    }

    .intro,
    .evidence {
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.93);
      box-shadow: 0 22px 70px rgba(45, 52, 93, 0.10);
    }

    .intro {
      padding: 48px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      padding: 9px 14px;
      border-radius: 999px;
      background: var(--indigo-soft);
      color: var(--indigo);
      font-size: 15px;
      font-weight: 750;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--indigo);
      box-shadow: 0 0 0 5px rgba(88, 72, 215, 0.12);
    }

    h1 {
      margin: 34px 0 18px;
      max-width: 570px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 72px;
      line-height: 0.98;
      letter-spacing: -0.045em;
      font-weight: 700;
    }

    .lede {
      margin: 0;
      max-width: 560px;
      color: var(--muted);
      font-size: 22px;
      line-height: 1.5;
    }

    .inventory {
      margin-top: 42px;
      padding-top: 32px;
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .metric strong {
      display: block;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 56px;
      line-height: 1;
      color: var(--indigo);
    }

    .metric span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 16px;
    }

    .evidence {
      padding: 34px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 22px;
    }

    .evidence-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .evidence-header h2 {
      margin: 0;
      font-size: 21px;
      letter-spacing: -0.02em;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 9px 13px;
      border-radius: 12px;
      background: var(--cyan-soft);
      color: #087082;
      font-size: 14px;
      font-weight: 750;
    }

    .status::before {
      content: "✓";
      width: 21px;
      height: 21px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--cyan);
      color: white;
      font-size: 13px;
    }

    .zero-diff {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: #fbfcff;
    }

    .zero-cell {
      padding: 24px 18px;
      text-align: center;
      border-right: 1px solid var(--line);
    }

    .zero-cell:last-child { border-right: 0; }

    .zero-cell strong {
      display: block;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 43px;
      line-height: 1;
      color: var(--cyan);
    }

    .zero-cell span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.11em;
    }

    .risk-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .risk {
      position: relative;
      min-height: 164px;
      padding: 24px;
      border-radius: 19px;
      overflow: hidden;
      border: 1px solid transparent;
    }

    .risk::after {
      content: attr(data-risk);
      position: absolute;
      right: -4px;
      bottom: -21px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 92px;
      font-weight: 700;
      line-height: 1;
      opacity: 0.08;
    }

    .risk .label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .risk strong {
      display: block;
      margin-top: 17px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 48px;
      line-height: 1;
    }

    .risk p {
      margin: 8px 0 0;
      font-size: 15px;
      line-height: 1.35;
    }

    .p0 { background: var(--rose-soft); border-color: #f3c8d2; color: #92344b; }
    .p1 { background: var(--amber-soft); border-color: #f0d3ad; color: #985010; }
    .p2 { background: var(--cyan-soft); border-color: #bee9ec; color: #087082; }
    .p3 { background: var(--indigo-soft); border-color: #d5d0fa; color: #4739b5; }

    .gate {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 18px 21px;
      border-radius: 16px;
      background: var(--ink);
      color: white;
    }

    .gate b {
      font-size: 16px;
      letter-spacing: 0.02em;
    }

    .gate span {
      color: #cfd6ec;
      font-size: 14px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <main aria-label="脱敏只读审计摘要">
    <section class="intro">
      <div>
        <div class="eyebrow">第一步 · 只读审计</div>
        <h1>先看清残留，<br />再保护产品。</h1>
        <p class="lede">完整清点并分级之后，项目里的任何字节才有可能被修改。</p>
      </div>
      <div class="inventory" aria-label="聚合清点数量">
        <div class="metric"><strong>350</strong><span>已清点文件</span></div>
        <div class="metric"><strong>523</strong><span>已分级发现项</span></div>
      </div>
    </section>

    <section class="evidence">
      <div class="evidence-header">
        <h2>只读证据</h2>
        <div class="status">源项目保持不变</div>
      </div>

      <div class="zero-diff" aria-label="项目清点对比">
        <div class="zero-cell"><strong>0</strong><span>新增</span></div>
        <div class="zero-cell"><strong>0</strong><span>移除</span></div>
        <div class="zero-cell"><strong>0</strong><span>改动</span></div>
      </div>

      <div class="risk-grid" aria-label="Risk classification counts">
        <article class="risk p0" data-risk="P0"><span class="label">受保护</span><strong>132</strong><p>法律与疑似敏感证据保持不变。</p></article>
        <article class="risk p1" data-risk="P1"><span class="label">高风险</span><strong>52</strong><p>标识迁移前必须准备迁移与回滚方案。</p></article>
        <article class="risk p2" data-risk="P2"><span class="label">用户决定</span><strong>52</strong><p>样例与演示需要用户明确选择。</p></article>
        <article class="risk p3" data-risk="P3"><span class="label">展示残留</span><strong>287</strong><p>中性替换可以进入项目外预览。</p></article>
      </div>

      <div class="gate">
        <b>第一道门：已提出范围建议</b>
        <span>生成预览前，等待用户明确批准</span>
      </div>
    </section>
  </main>
</body>
</html>
