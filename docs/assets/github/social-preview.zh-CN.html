<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>de-starter GitHub 中文分享封面</title>
  <style>
    * { box-sizing:border-box; }
    html,body { width:100%; height:100%; margin:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; background:#10213f; color:white; }
    main { width:1280px; height:640px; position:relative; overflow:hidden; padding:80px; background:linear-gradient(125deg,#10213f 0%,#173562 58%,#155d68 100%); }
    main::before { content:""; position:absolute; width:430px; height:430px; border:1px solid rgba(117,225,188,.28); border-radius:50%; right:-90px; top:-150px; box-shadow:0 0 0 70px rgba(117,225,188,.05),0 0 0 140px rgba(117,225,188,.035); }
    .brand { display:flex; align-items:center; gap:16px; color:#78e2be; font-size:27px; font-weight:850; letter-spacing:.02em; }
    .mark { width:38px; height:38px; border-radius:11px; display:grid; place-items:center; color:#10213f; background:#78e2be; font-weight:950; }
    h1 { margin:44px 0 20px; max-width:930px; font-size:68px; line-height:1.08; letter-spacing:-.045em; }
    .features { font-size:27px; color:#dbe5f5; font-weight:650; letter-spacing:.01em; }
    .footer { position:absolute; left:80px; right:80px; bottom:62px; display:flex; align-items:center; justify-content:space-between; border-top:1px solid rgba(255,255,255,.18); padding-top:25px; }
    .risk { color:#ffd58e; font-size:23px; font-weight:800; }
    .type { color:#b8c7de; font-size:20px; }
  </style>
</head>
<body>
  <main>
    <div class="brand"><span class="mark">D</span><span>de-starter · 通用 Agent Skill</span></div>
    <h1>安全去除 Starter 痕迹</h1>
    <div class="features">P0–P3 分级｜两道审批｜项目外预览｜恢复证据</div>
    <div class="footer"><span class="risk">低风险不等于零风险</span><span class="type">开源 · 可审计 · 可复现</span></div>
  </main>
</body>
</html>
